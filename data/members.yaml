# DSI Open Source Contributors
# ------------------------------
# Add yourself by appending an entry to the `members` list below and opening a
# pull request. A GitHub Action validates this file on every PR.
#
# Fields:
#   name         (required)  Your full name as you'd like it shown.
#   github       (required)  Your GitHub username (no @, no URL). Used to fetch
#                            your public contributions automatically.
#   role         (required)  One of: faculty | staff | student | postdoc |
#                            affiliate | member
#   affiliation  (optional)  Lab, department, or group. Defaults to "DSI".
#   joined       (optional)  Month you joined, e.g. 2024-09.
#   active       (optional)  true/false. Defaults to true. Set false to keep a
#                            historical record without counting in active stats.
#   links        (optional)  Map of extra profile links (website, scholar, etc).

