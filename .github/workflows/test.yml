name: Tests

# Exercises the data builder's logic whenever the scripts change.
on:
  push:
    paths:
      - "scripts/**"
      - ".github/workflows/test.yml"
  pull_request:
    paths:
      - "scripts/**"
      - ".github/workflows/test.yml"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scripts/requirements-dev.txt
      - name: Run tests
        run: pytest scripts -v
