name: Build & deploy dashboard

# Refreshes contribution data from GitHub and publishes the static dashboard to
# GitHub Pages. Triggered when data/code changes land on main, on a nightly
# schedule, and manually.
on:
  push:
    branches: [main]
    paths:
      - "data/**"
      - "scripts/**"
      - "docs/**"
      - ".github/workflows/build.yml"
  schedule:
    - cron: "17 6 * * *" # daily at 06:17 UTC
  workflow_dispatch:

# Allow this workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; newer runs cancel queued older ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r scripts/requirements.txt
      - name: Validate before building
        run: python scripts/validate.py
      - name: Build data.json
        env:
          # The default token is enough for public read-only search queries.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/build_data.py
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
